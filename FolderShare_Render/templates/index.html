<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FolderShare</title>

    /static/style.css
</head>
<body>

<div class="container">

    <h1>📁 FolderShare</h1>
    <p class="subtitle">
        Deel bestanden met een unieke code.
    </p>

    <section class="card">

        <h2>🚀 Map delen</h2>

        /share" enctype="multipart/form-data">

            <div class="upload-box">

                <input
                    type="file"
                    id="folderInput"
                    name="files"
                    webkitdirectory
                    multiple>

                <p id="fileInfo">
                    Geen map geselecteerd
                </p>

            </div>

            <button type="submit">
                Deel bestanden
            </button>

        </form>

    </section>

    <section class="card">

        <h2>📥 Bestand ophalen</h2>

        " method="get">

            <input
                type="text"
                name="code"
                placeholder="Voer share-code in">

            <button type="submit">
                Downloaden
            </button>

        </form>

    </section>

</div>

<script>

const folderInput =
document.getElementById("folderInput");

const fileInfo =
document.getElementById("fileInfo");

folderInput.addEventListener("change", () => {

    const count = folderInput.files.length;

    if(count > 0){

        fileInfo.textContent =
        `✅ ${count} bestanden geselecteerd`;

    } else {

        fileInfo.textContent =
        "Geen map geselecteerd";

    }

});

</script>

</body>
</html>
